name: Post-Merge Release Evidence

on:
  workflow_run:
    workflows: [Post-Merge Distribution Integrity]
    types: [completed]

permissions:
  actions: read
  checks: read
  contents: read
  pull-requests: read
  statuses: write

jobs:
  reconcile:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    uses: pcvantol/djconnect/.github/workflows/post-merge-release-evidence.yml@a73237f907554b2fba16e0e168d5fde22ce75455
    with:
      policy_source_ref: 5fb2c41f29c01a9c0000475fe8565d943f090d60
      required_main_workflow: Post-Merge Distribution Integrity
      repository_role: distribution
      distribution_evidence_artifact_name: platform-release-distribution-integrity
